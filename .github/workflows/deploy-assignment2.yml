name: Assignment 2 - Deploy Container App

on:
  workflow_dispatch:
  push:
    branches:
      - assignment2
    paths:
      - 'Assignment2/**'
      - 'Terraform/**'
      - '.github/workflows/deploy-assignment2.yml'

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: '1.5.0'
  WORKING_DIR: './Terraform'
  IMAGE_NAME: 'assignment2-webapp'
  # Backend (created on first run by the tfstate-backend job below)
  BACKEND_RESOURCE_GROUP: 'rg-tfstate-carsonl15'
  BACKEND_STORAGE_ACCOUNT: 'tfstatecarsonl15a2'
  BACKEND_CONTAINER: 'tfstate'
  BACKEND_KEY: 'assignment2.terraform.tfstate'
  # Azure auth for Terraform's azurerm provider
  ARM_CLIENT_ID: ${{ vars.CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ vars.TENANT_ID }}
  ARM_USE_OIDC: 'true'
  # Terraform input variables
  TF_VAR_resource_group_name: 'rg-assignment2-carsonl15'
  TF_VAR_location: 'eastus'
  TF_VAR_environment_name: 'env-assignment2'
  TF_VAR_container_app_name: 'ca-assignment2'
  TF_VAR_container_registry_name: ${{ vars.CONTAINER_REGISTRY_NAME }}

jobs:
  tfstate-backend:
    name: Ensure Terraform State Backend Exists
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.CLIENT_ID }}
          tenant-id: ${{ vars.TENANT_ID }}
          subscription-id: ${{ vars.SUBSCRIPTION_ID }}

      - name: Register required Azure resource providers
        run: |
          for ns in Microsoft.App Microsoft.OperationalInsights Microsoft.ContainerRegistry Microsoft.ManagedIdentity; do
            az provider register --namespace "$ns" --wait
          done

      - name: Create state RG, storage account, and container if missing
        run: |
          set -e
          az group create -n "${{ env.BACKEND_RESOURCE_GROUP }}" -l "${{ env.TF_VAR_location }}" -o none
          if ! az storage account show -n "${{ env.BACKEND_STORAGE_ACCOUNT }}" -g "${{ env.BACKEND_RESOURCE_GROUP }}" -o none 2>/dev/null; then
            az storage account create \
              -n "${{ env.BACKEND_STORAGE_ACCOUNT }}" \
              -g "${{ env.BACKEND_RESOURCE_GROUP }}" \
              -l "${{ env.TF_VAR_location }}" \
              --sku Standard_LRS \
              --allow-blob-public-access false \
              --min-tls-version TLS1_2 \
              -o none
          fi
          KEY=$(az storage account keys list -g "${{ env.BACKEND_RESOURCE_GROUP }}" -n "${{ env.BACKEND_STORAGE_ACCOUNT }}" --query '[0].value' -o tsv)
          az storage container create \
            -n "${{ env.BACKEND_CONTAINER }}" \
            --account-name "${{ env.BACKEND_STORAGE_ACCOUNT }}" \
            --account-key "$KEY" \
            -o none

  bootstrap:
    name: Terraform Bootstrap (RG + ACR)
    runs-on: ubuntu-latest
    needs: tfstate-backend
    environment: production
    outputs:
      acr_login_server: ${{ steps.tf_output.outputs.acr_login_server }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.CLIENT_ID }}
          tenant-id: ${{ vars.TENANT_ID }}
          subscription-id: ${{ vars.SUBSCRIPTION_ID }}

      - name: Look up service principal object ID
        run: |
          SP_OBJECT_ID=$(az ad sp show --id "${{ vars.CLIENT_ID }}" --query id -o tsv)
          echo "TF_VAR_github_actions_sp_object_id=$SP_OBJECT_ID" >> "$GITHUB_ENV"

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ env.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ env.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ env.BACKEND_CONTAINER }}" \
            -backend-config="key=${{ env.BACKEND_KEY }}"

      - name: Terraform Plan (RG + ACR + AcrPush only)
        working-directory: ${{ env.WORKING_DIR }}
        env:
          TF_VAR_container_image: 'placeholder'
        run: |
          terraform plan -out=tfplan \
            -target=azurerm_resource_group.main \
            -target=azurerm_container_registry.main \
            -target=azurerm_role_assignment.acr_push

      - name: Terraform Apply (RG + ACR + AcrPush only)
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Capture ACR login server
        id: tf_output
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          ACR_LOGIN_SERVER=$(terraform output -raw container_registry_login_server)
          echo "acr_login_server=$ACR_LOGIN_SERVER" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build and Push Container Image
    runs-on: ubuntu-latest
    needs: bootstrap
    environment: production
    outputs:
      image_tag: ${{ steps.image.outputs.tag }}
      image_ref: ${{ steps.image.outputs.ref }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.CLIENT_ID }}
          tenant-id: ${{ vars.TENANT_ID }}
          subscription-id: ${{ vars.SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name "${{ vars.CONTAINER_REGISTRY_NAME }}"

      - name: Compute image reference
        id: image
        run: |
          TAG="${GITHUB_SHA::7}"
          REF="${{ needs.bootstrap.outputs.acr_login_server }}/${IMAGE_NAME}:${TAG}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Will publish: $REF"

      - name: Publish container image
        run: |
          dotnet publish Assignment2/WebApp/WebApp.csproj \
            --os linux --arch x64 \
            -c Release \
            /t:PublishContainer \
            /p:ContainerRegistry=${{ needs.bootstrap.outputs.acr_login_server }} \
            /p:ContainerImageTag=${{ steps.image.outputs.tag }}

  deploy:
    name: Terraform Apply (Container App)
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.CLIENT_ID }}
          tenant-id: ${{ vars.TENANT_ID }}
          subscription-id: ${{ vars.SUBSCRIPTION_ID }}

      - name: Look up service principal object ID
        run: |
          SP_OBJECT_ID=$(az ad sp show --id "${{ vars.CLIENT_ID }}" --query id -o tsv)
          echo "TF_VAR_github_actions_sp_object_id=$SP_OBJECT_ID" >> "$GITHUB_ENV"

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ env.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ env.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ env.BACKEND_CONTAINER }}" \
            -backend-config="key=${{ env.BACKEND_KEY }}"

      - name: Terraform Plan
        working-directory: ${{ env.WORKING_DIR }}
        env:
          TF_VAR_container_image: ${{ needs.build-and-push.outputs.image_ref }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Verify the container app is serving the image
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          URL=$(terraform output -raw container_app_url)
          echo "Probing $URL ..."
          for attempt in 1 2 3 4 5 6 7 8; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "✓ App responded with 200 on attempt $attempt"
              echo "URL=$URL" >> "$GITHUB_ENV"
              exit 0
            fi
            echo "Attempt $attempt got HTTP $CODE, sleeping 20s..."
            sleep 20
          done
          echo "❌ App did not respond with 200 after 8 attempts (~3 min)"
          echo "Last status code: $CODE"
          exit 1

      - name: Show deployment URL
        if: success()
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          URL=$(terraform output -raw container_app_url)
          echo "## ✅ Container App Deployed and Verified" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: $URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: ${{ needs.build-and-push.outputs.image_ref }}" >> "$GITHUB_STEP_SUMMARY"
