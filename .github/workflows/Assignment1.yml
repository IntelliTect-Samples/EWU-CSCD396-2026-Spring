name: Assignment 1

on:
  workflow_dispatch:
  push:
    branches:
      - Assignment1
    paths:
      - 'Assignment1/**'
      - '.github/workflows/Assignment1.yml'

# Required for OIDC authentication
permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: '8.0.x'
  AZURE_WEBAPP_NAME: 'cscd396-jake-webapp'
  WEBAPP_PACKAGE_PATH: 'Assignment1/WebApp'

jobs:
  list-azure-resources:
    name: Login and List Azure Resources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.CLIENT_ID }}
          tenant-id: ${{ vars.TENANT_ID }}
          subscription-id: ${{ vars.SUBSCRIPTION_ID }}

      - name: Run Assignment1.ps1 - List Resources
        shell: pwsh
        run: |
          ./Assignment1/Assignment1.ps1

      - name: Logout from Azure
        if: always()
        run: az logout

  build-and-deploy-webapp:
    name: Build and Deploy .NET Web App
    runs-on: ubuntu-latest
    needs: list-azure-resources

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build and publish
        run: |
          dotnet publish ${{ env.WEBAPP_PACKAGE_PATH }}/WebApp.csproj \
            --configuration Release \
            --output ./publish

      - name: Azure Login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.CLIENT_ID }}
          tenant-id: ${{ vars.TENANT_ID }}
          subscription-id: ${{ vars.SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ./publish

      - name: Logout from Azure
        if: always()
        run: az logout
