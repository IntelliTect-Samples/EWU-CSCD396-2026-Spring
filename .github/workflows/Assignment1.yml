name: Assignment 1

on:
  workflow_dispatch:

jobs:
  azure-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: List resources in subscription
        run: az resource list --output table
