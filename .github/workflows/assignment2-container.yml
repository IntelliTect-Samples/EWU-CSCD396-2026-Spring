name: Assignment 2 Container Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - Assignment-2
    paths:
      - 'Assignment2/**'
      - '.github/workflows/assignment2-container.yml'

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: '1.5.0'
  WORKING_DIR: './Assignment2/Terraform'

  ACR_NAME: 'crawfordacr2026'
  IMAGE_NAME: 'crawfordacr2026.azurecr.io/netwebbasedapp:${{ github.sha }}'

  BACKEND_RESOURCE_GROUP: ${{ vars.TF_STATE_RESOURCE_GROUP }}
  BACKEND_STORAGE_ACCOUNT: ${{ vars.TF_STATE_STORAGE_ACCOUNT }}
  BACKEND_CONTAINER: ${{ vars.TF_STATE_CONTAINER }}
  BACKEND_KEY: ${{ vars.TF_STATE_KEY }}

  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_USE_OIDC: true

  TF_VAR_resource_group_name: 'rg-assignment2-crawford'
  TF_VAR_location: 'eastus'
  TF_VAR_container_app_name: 'ca-assignment2-crawford'
  TF_VAR_environment_name: 'env-assignment2-crawford'
  TF_VAR_container_image_name: 'crawfordacr2026.azurecr.io/netwebbasedapp:${{ github.sha }}'

jobs:
  build-push-and-deploy:
    name: Build, Push, and Deploy Container App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login with OIDC
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build Docker Image
        run: |
          docker build -f ./Assignment2/NetWebBasedApp/DockerBuild.dockerfile \
            -t $IMAGE_NAME \
            ./Assignment2/NetWebBasedApp

      - name: Login to Azure Container Registry
        run: az acr login --name $ACR_NAME

      - name: Push Docker Image
        run: docker push $IMAGE_NAME

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ env.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ env.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ env.BACKEND_CONTAINER }}" \
            -backend-config="key=${{ env.BACKEND_KEY }}" \
            -backend-config="use_azuread_auth=true"

      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform plan

      - name: Terraform Apply
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform apply -auto-approve

      - name: Display Container App URL
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "## Assignment 2 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Container App:** $(terraform output -raw container_app_url)" >> $GITHUB_STEP_SUMMARY