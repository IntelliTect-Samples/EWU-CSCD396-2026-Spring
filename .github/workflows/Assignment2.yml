name: Assignment2 Workflow
on:
    push:
        branches:
            - Assignment2
permissions:
    id-token: write
    contents: read
env:
  IMAGE_NAME: assignment2acrwiilke.azurecr.io/assignment2webapp:latest
  ACR_NAME: assignment2acrwiilke
jobs:
    run-script:
        runs-on: ubuntu-latest
 
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Azure Login (OIDC)
              uses: azure/login@v2
              with:
                client-id: ${{ secrets.AZURE_CLIENT_ID }}
                tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            - name: Install Terraform
              uses: hashicorp/setup-terraform@v3

            - name: Terraform Init
              working-directory: ./Assignment2/Terraform
              run: terraform init

            - name: Terraform Plan Infrastructure
              working-directory: ./Assignment2/Terraform
              run: terraform plan

            - name: ACR Login
              run: az acr login --name $ACR_NAME

            - name: Build Webapp
              run: docker build -t assignment2webapp ./Assignment2Webapp

            - name: Tag Image
              run: docker tag assignment2webapp $IMAGE_NAME

            - name: Push Image
              run: docker push $IMAGE_NAME
              
            - name: Terraform Plan App Image
              working-directory: ./Assignment2/Terraform
              run: terraform plan -var="image_name=$IMAGE_NAME"

            - name: Terraform Apply App Image
              working-directory: ./Assignment2/Terraform
              run: terraform apply -auto-approve -var="image_name=$IMAGE_NAME"