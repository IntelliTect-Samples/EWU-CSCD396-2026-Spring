name: Deploy Container App

on:
  workflow_dispatch:
  push:
    branches:
      - Assignment2

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    env:
      TF_VAR_acr_login_server: 396acr.azurecr.io
      TF_VAR_acr_username: ${{ secrets.TF_VAR_acr_username }}
      TF_VAR_acr_password: ${{ secrets.TF_VAR_acr_password }}
      
    defaults:
      run:
        working-directory: Assignment 2/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -var="container_image=396acr.azurecr.io/assignment2:v1"

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="container_image=396acr.azurecr.io/assignment2:v1"