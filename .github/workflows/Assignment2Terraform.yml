name: Assignment2Terraform

on:
  push:
    branches:
      - main
    paths:
      - "Assignment2/DevOpsApp/terraform/**"
      - ".github/workflows/Assignment2Terraform.yml"

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ./Assignment2/DevOpsApp/terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./Assignment2/DevOpsApp/terraform

      - name: Terraform Plan
        run: terraform plan -var="image_name=a2containerregistrybillm.azurecr.io/devopsapp:v1"
        working-directory: ./Assignment2/DevOpsApp/terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="image_name=a2containerregistrybillm.azurecr.io/devopsapp:v1"
        working-directory: ./Assignment2/DevOpsApp/terraform
