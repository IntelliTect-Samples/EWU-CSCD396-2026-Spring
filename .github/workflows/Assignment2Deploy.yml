name: Deploy to Azure

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: a2containerregistrybillm

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set image name
        run: echo "IMAGE_NAME=${{ env.ACR_NAME }}.azurecr.io/devopsapp:${{ github.sha }}" >> $GITHUB_ENV

      - name: Build container image
        run: docker build -t $IMAGE_NAME .
        working-directory: ./Assignment2/DevOpsApp

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Push container image
        run: docker push $IMAGE_NAME

      - name: Terraform Init
        run: terraform init
        working-directory: ./Assignment2/DevOpsApp/terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./Assignment2/DevOpsApp/terraform

      - name: Terraform Plan
        run: terraform plan -var="image_name=$IMAGE_NAME"
        working-directory: ./Assignment2/DevOpsApp/terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="image_name=$IMAGE_NAME"
        working-directory: ./Assignment2/DevOpsApp/terraform
